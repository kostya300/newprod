# .github/workflows/deploy.yml
name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy files to VPS
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -e
          echo "🚀 Deploying to $DEPLOY_HOST..."
          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" 'mkdir -p /tmp/deploy'
          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" 'rm -f /tmp/deploy/files.tar.gz'

          # ✅ Архивируем ТОЛЬКО store/, users/, templates/, newprod/ — БЕЗ media/ и static/
          tar -czf - \
            --exclude='__pycache__' --exclude='*.pyc' \
            store/ users/ newprod/ templates/ | \
            ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" 'cat > /tmp/deploy/files.tar.gz'

          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" '
            cd /var/www/newprod &&
            # ✅ Удаляем ТОЛЬКО store/, users/, templates/, newprod/ — media/ и static/ ОСТАЮТСЯ!
            rm -rf store/ users/ newprod/ templates/ &&
            tar -xzf /tmp/deploy/files.tar.gz &&
            rm /tmp/deploy/files.tar.gz &&
            echo "✅ Files deployed (media/static preserved)."
          '

      - name: Restart backend
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" '
            cd /var/www/newprod &&
            docker compose restart backend &&
            sleep 5 &&
            docker compose ps backend
          '
          echo "✅ Backend restarted"