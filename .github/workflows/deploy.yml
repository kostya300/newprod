name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy files to VPS
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -e
          echo "🚀 Deploying to $DEPLOY_HOST..."
          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" 'mkdir -p /tmp/deploy'
          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" 'rm -f /tmp/deploy/files.tar.gz'

          # ✅ Архивируем ВСЁ, кроме media/, static/, __pycache__, *.pyc
          tar -czf - \
            --exclude='media/' \
            --exclude='static/' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='*.pyd' \
            store/ users/ newprod/ templates/ | \
            ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" 'cat > /tmp/deploy/files.tar.gz'

          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" '
            cd /var/www/newprod &&
            rm -rf store/ users/ newprod/ templates/ &&
            tar -xzf /tmp/deploy/files.tar.gz &&
            rm /tmp/deploy/files.tar.gz &&
            echo "✅ Files deployed (media/static preserved)."
          '

      - name: Full rebuild with cache cleanup
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" '
            cd /var/www/newprod &&
            #Очищаем Redis
            docker exec newprod-redis-1 redis-cli FLUSHALL 2>/dev/null || true &&
            # Очищаем __pycache__
            docker exec newprod-backend-1 find /app -name "*.pyc" -delete 2>/dev/null || true
            docker exec newprod-backend-1 find /app -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true &&
            docker compose down &&
            docker compose up -d --build &&
            sleep 15 &&
            docker compose ps
          '
          echo "✅ Full rebuild completed"