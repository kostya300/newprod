<!-- templates/registration/password_reset_complete.html -->
{% extends "base.html" %}
{% load static %}
{% block title %}Пароль изменён — ВИКИ{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/password_reset_complete.css' %}">
{% endblock %}

{% block content %}
    <main class="login-container">
        <section class="login-form password-reset-complete">
            <!-- Иконка -->
            <div class="password-reset-complete__icon">✅</div>

            <!-- Заголовок -->
            <h1 class="password-reset-complete__title">Пароль успешно изменён</h1>

            <!-- Подзаголовок -->
            <p class="password-reset-complete__subtitle">
                Теперь вы можете войти с новым паролем.
            </p>

            <!-- Кнопка входа -->
            <a href="{% url 'users:login' %}" class="password-reset-complete__btn">
                Войти в аккаунт
            </a>
        </section>
    </main>

    <!-- Автоматический редирект через 5 секунд -->
    <script>
        setTimeout(() => {
            window.location.href = "{% url 'users:login' %}";
        }, 5000);
    </script>
{% endblock %}
