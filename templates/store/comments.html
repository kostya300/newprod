<!-- templates/store/comments.html -->
<section class="comments-section" id="comments-section">
    <h2>Комментарии ({{ comments.count }})</h2>

    {% if request.user.is_authenticated %}
        <div class="add-comment">
            <form class="comment-form" data-product-id="{{ product.id }}">
                {% csrf_token %}
                <textarea name="text" placeholder="Оставьте свой комментарий..." required></textarea>
                <input type="hidden" name="parent" value="" />
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Отправить</button>
                </div>
            </form>
        </div>
    {% else %}
        <p><a href="{% url 'users:login' %}">Войдите</a>, чтобы оставить комментарий.</p>
    {% endif %}

    <div class="comments-list" id="comments-list">
        {% include "store/includes/comments_tree.html" %}
    </div>

<!-- Шаблон формы ответа (скрытый) -->
    <template id="reply-form-template">
        <div class="reply-form-container">
            <form class="reply-form" data-product-id="{{ product.id }}">
                {% csrf_token %}
                <textarea name="text" placeholder="Напишите ваш ответ..." required></textarea>
                <input type="hidden" name="parent" value="" />
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Отправить</button>
                    <button type="button" class="cancel-btn">Отмена</button>
                </div>
            </form>
        </div>
    </template>
</section>
