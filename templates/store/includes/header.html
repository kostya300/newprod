<!-- templates/store/includes/header.html -->
{% load static %}
<header class="header">
    <!-- Левая часть -->

    <div class="header-left">
        <!-- Кнопка поиска -->
        <button class="search-icon-btn" id="open-search-btn" title="Поиск">🔍</button>

        <!-- templates/store/includes/header.html -->
        <button class="desktop-filter-btn" id="open-filter-btn" title="Фильтры">
            <svg class="filter-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
</svg>
            <span class="filter-text">Фильтры</span>
        </button>

        <!-- Подключаем выпадающий фильтр -->
        {% include "store/includes/dropdowndesktop.html" %}
    </div>

    <!-- Правая часть — как есть -->
    <div class="header-right">


        {% if user.is_authenticated %}
            <div class="mobile-actions">
                <button class="icon-btn cart-icon" title="Корзина" onclick="window.location='{% url 'cart' %}'">🛒
                </button>
                <button class="avatar-btn" title="Профиль" onclick="window.location='{% url 'users:profile' %}'">
                    <img src="

                            {% if user.avatar %}{{ user.avatar.url }}{% else %}{% static 'images/profile/default-avatar.png' %}{% endif %}"
                         alt="Аватар"
                         class="mini-avatar">
                </button>
            </div>

            <div class="desktop-actions">
                <button class="gradient-btn" onclick="window.location='{% url 'users:logout' %}'">Выйти</button>
                <button class="gradient-btn" onclick="window.location='{% url 'cart' %}'">Корзина</button>
            </div>
        {% else %}
            <button class="gradient-btn" onclick="window.location='{% url 'users:login' %}'">Войти</button>
        {% endif %}
    </div>
</header>
