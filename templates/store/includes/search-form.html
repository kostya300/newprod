<!-- templates/store/includes/search-form.html -->
<form method="get" action="{% url 'product_search'  %}" class="search-form">
    <input
        type="text"
        name="q"
        placeholder="Введите название товара..."
        class="search-input"
        autocomplete="off"
        autofocus
    >
    <button type="submit" class="search-submit">🔍 Найти</button>
</form>
