events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log /dev/stderr;

    # Блок для автоматического перенаправления с HTTP на HTTPS
    server {
        listen 80;
        server_name myunitmyunit1.ru www.myunitmyunit1.ru;

        return 301 https://$host$request_uri;
    }

    # Основной рабочий блок для HTTPS
    server {
        listen 443 ssl http2;
        server_name myunitmyunit1.ru www.myunitmyunit1.ru;

        ssl_certificate /etc/letsencrypt/live/myunitmyunit1.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/myunitmyunit1.ru/privkey.pem;

        ssl_protocols TLSv1.2;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        location / {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
        }

        location /static/ {
            alias /staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /media/;
            expires 7d;
        }

        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }
    }
}